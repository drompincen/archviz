<!DOCTYPE html>
<html lang="en">
<head>

<body>
<canvas id="particles"></canvas>

<div class="topbar">
  <div class="brand" onclick="goHome()"><div class="logo"></div><div><div class="title">ARCHVIZ</div></div></div>

  <button class="home-btn" onclick="goHome()"><span style="font-size:20px">&#8962;</span> Topics</button>

  <div class="stats-row">

  </div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- DYNAMIC PAGE CONTAINER -->
<div class="page" id="pageContainer"></div>

<script src="js/wizard.js"></script>
